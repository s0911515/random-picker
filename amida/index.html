<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あみだくじ — RANDOM PICKER</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#04040f;--green:#34d399;--text:#e2e8f0;--muted:#64748b;--border:rgba(255,255,255,.09);--glass:rgba(255,255,255,.04)}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}

nav{width:100%;padding:1.2rem 2rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid var(--border);background:rgba(4,4,15,.85);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50}
.back{display:inline-flex;align-items:center;gap:.4rem;color:var(--muted);font-size:.85rem;text-decoration:none;transition:color .2s}.back:hover{color:var(--text)}.back svg{width:16px;height:16px}
.nav-title{font-weight:800;font-size:1rem;color:var(--green);letter-spacing:.05em}

.glow-bg{position:fixed;inset:0;pointer-events:none;z-index:0}
.glow-bg::before{content:'';position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(52,211,153,.09),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 5s ease-in-out infinite alternate}
@keyframes pulse{from{opacity:.5;transform:translate(-50%,-50%) scale(1)}to{opacity:1;transform:translate(-50%,-50%) scale(1.2)}}

main{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;padding:2rem 1.5rem;gap:1.75rem;width:100%;max-width:900px}

.page-title{text-align:center}
.page-title h1{font-size:2.2rem;font-weight:900}
.page-title h1 span{background:linear-gradient(135deg,#6ee7b7,#34d399,#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.page-title p{color:var(--muted);font-size:.82rem;margin-top:.3rem;letter-spacing:.08em}

/* INPUTS */
.setup-panel{
  width:100%;background:var(--glass);border:1px solid var(--border);border-radius:20px;padding:1.5rem;
}
.setup-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.75rem;
}
.setup-title{font-size:.9rem;font-weight:700;color:var(--green);letter-spacing:.08em}
.count-ctrl{display:flex;align-items:center;gap:.75rem}
.cnt-btn{
  width:30px;height:30px;border-radius:50%;border:1px solid rgba(52,211,153,.35);
  background:transparent;color:var(--green);font-size:1.2rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.cnt-btn:hover{background:rgba(52,211,153,.15)}
.cnt-num{font-size:1rem;font-weight:700;color:var(--green);min-width:1.5rem;text-align:center}
.input-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.75rem}
.name-group{display:flex;flex-direction:column;gap:.35rem}
.name-label{font-size:.7rem;color:var(--muted);letter-spacing:.1em}
.name-input,.prize-input{
  background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;
  padding:.55rem .8rem;color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s;width:100%;
}
.name-input:focus,.prize-input:focus{border-color:var(--green)}
.name-input::placeholder,.prize-input::placeholder{color:var(--muted)}
.prizes-section{margin-top:1.25rem}
.prizes-title{font-size:.7rem;color:var(--muted);letter-spacing:.1em;margin-bottom:.75rem}
.prize-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.75rem}

/* INSTRUCTIONS */
.instruction{
  font-size:.85rem;color:var(--muted);text-align:center;
  background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.15);
  border-radius:12px;padding:.75rem 1.5rem;
}

/* CANVAS AREA */
.canvas-outer{
  position:relative;width:100%;overflow-x:auto;
  background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:20px;padding:1rem;
}
#ac{display:block;margin:0 auto;max-width:100%}

/* BUTTONS */
.btn-row{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
.gen-btn,.reset-btn{
  padding:.85rem 2.25rem;border-radius:50px;border:none;cursor:pointer;
  font-size:1rem;font-weight:900;letter-spacing:.08em;transition:all .25s;
}
.gen-btn{
  background:linear-gradient(135deg,#6ee7b7,#34d399,#059669);color:#011b0d;
  box-shadow:0 4px 28px rgba(52,211,153,.4);animation:btnGlow 2.5s ease-in-out infinite;
}
@keyframes btnGlow{0%,100%{box-shadow:0 4px 28px rgba(52,211,153,.35),0 0 0 0 rgba(52,211,153,.2)}50%{box-shadow:0 6px 36px rgba(52,211,153,.6),0 0 0 10px rgba(52,211,153,0)}}
.gen-btn:hover{transform:translateY(-3px) scale(1.04)}
.gen-btn:disabled{opacity:.4;cursor:not-allowed;animation:none;transform:none}
.reset-btn{background:var(--glass);border:1px solid var(--border);color:var(--muted)}
.reset-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}

/* RESULT OVERLAY */
.overlay{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(4,4,15,.87);backdrop-filter:blur(8px)}
.overlay.show{display:flex}
.result-card{
  background:rgba(10,25,20,.9);border:1px solid rgba(52,211,153,.4);border-radius:28px;
  padding:3rem 4rem;text-align:center;position:relative;overflow:hidden;
  animation:popIn .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.result-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(52,211,153,.18),transparent 70%)}
.r-from{font-size:.85rem;color:var(--muted);letter-spacing:.15em;margin-bottom:.6rem}
.r-name{font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:.3rem}
.r-arrow{font-size:2rem;color:var(--green);margin-bottom:.3rem}
.r-prize{font-size:2.5rem;font-weight:900;color:var(--green);text-shadow:0 0 30px rgba(52,211,153,.7);margin-bottom:.5rem}
.r-label{font-size:.8rem;color:var(--muted)}
.close-btn{margin-top:2rem;padding:.7rem 2rem;border-radius:50px;border:1px solid rgba(52,211,153,.35);background:transparent;color:var(--green);font-weight:700;cursor:pointer;font-size:.9rem;transition:all .2s}
.close-btn:hover{background:rgba(52,211,153,.1)}

/* confetti */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:99}
</style>
</head>
<body>
<div class="glow-bg"></div>
<canvas id="confetti"></canvas>

<nav>
  <a class="back" href="../"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>TOP</a>
  <span class="nav-title">✦ あみだくじ</span>
</nav>

<main>
  <div class="page-title">
    <h1><span>あみだくじ</span></h1>
    <p>AMIDA LOTTERY — FOLLOW THE PATH</p>
  </div>

  <div class="setup-panel">
    <div class="setup-header">
      <div class="setup-title">参加者 PARTICIPANTS</div>
      <div class="count-ctrl">
        <button class="cnt-btn" onclick="changeN(-1)">−</button>
        <span class="cnt-num" id="n-num">4</span>
        <button class="cnt-btn" onclick="changeN(1)">＋</button>
        <span style="font-size:.7rem;color:var(--muted)">人 / PEOPLE</span>
      </div>
    </div>
    <div class="input-grid" id="name-grid"></div>
    <div class="prizes-section">
      <div class="prizes-title">当選項目 PRIZES</div>
      <div class="prize-grid" id="prize-grid"></div>
    </div>
  </div>

  <div class="btn-row">
    <button class="gen-btn" id="gen-btn" onclick="generate()">あみだを作る / GENERATE</button>
    <button class="reset-btn" onclick="resetAll()">リセット</button>
  </div>

  <div class="instruction" id="instruction" style="display:none">
    上の名前をクリックして運命のパスを辿ろう！
  </div>

  <div class="canvas-outer">
    <canvas id="ac"></canvas>
  </div>
</main>

<div class="overlay" id="overlay">
  <div class="result-card">
    <div class="r-from">参加者</div>
    <div class="r-name" id="r-name">—</div>
    <div class="r-arrow">↓</div>
    <div class="r-prize" id="r-prize">—</div>
    <div class="r-label">WINNER!</div>
    <button class="close-btn" onclick="closeOverlay()">閉じる / CLOSE</button>
  </div>
</div>

<script>
let N = 4;
let rungs = [];      // [{col1, col2, row}]
let ROWS = 12;       // number of horizontal segments
let generated = false;
let tracing = false;

const canvas = document.getElementById('ac');
const ctx = canvas.getContext('2d');

const PALETTE = ['#34d399','#22d3ee','#f472b6','#f59e0b','#a78bfa','#fb923c'];

/* ---- SETUP ---- */
function buildInputs() {
  const ng = document.getElementById('name-grid');
  const pg = document.getElementById('prize-grid');
  const defaultNames = ['Alice','Bob','Carol','Dave','Eve','Frank'];
  const defaultPrizes = ['🎉 大当たり','😊 当たり','🍀 小当たり','😅 ハズレ','🎁 プレゼント','💎 特賞'];
  ng.innerHTML = ''; pg.innerHTML = '';
  for (let i = 0; i < N; i++) {
    const ng_div = document.createElement('div');
    ng_div.className = 'name-group';
    ng_div.innerHTML = `<span class="name-label" style="color:${PALETTE[i]}">参加者 ${i+1}</span>
      <input class="name-input" id="name-${i}" type="text" placeholder="${defaultNames[i]}" maxlength="8" value="${defaultNames[i]}"/>`;
    ng.appendChild(ng_div);
    const pg_div = document.createElement('div');
    pg_div.className = 'name-group';
    pg_div.innerHTML = `<span class="name-label" style="color:${PALETTE[i]}">賞品 ${i+1}</span>
      <input class="prize-input" id="prize-${i}" type="text" placeholder="${defaultPrizes[i]}" maxlength="10" value="${defaultPrizes[i]}"/>`;
    pg.appendChild(pg_div);
  }
}

function changeN(d) {
  const n = N + d;
  if (n < 2 || n > 6) return;
  N = n;
  document.getElementById('n-num').textContent = N;
  buildInputs();
  resetCanvas();
}

/* ---- GENERATE ---- */
function generate() {
  generated = true;
  rungs = generateRungs();
  drawAmida();
  document.getElementById('instruction').style.display = 'block';
  document.getElementById('gen-btn').textContent = '再生成 / REGENERATE';
}

function generateRungs() {
  const result = [];
  for (let row = 0; row < ROWS; row++) {
    const used = new Set();
    // Shuffle columns to pick which ones get rungs
    const cols = shuffle(Array.from({length: N-1}, (_,i) => i));
    for (const c of cols) {
      if (!used.has(c) && !used.has(c+1)) {
        if (Math.random() < .45) {
          result.push({ c, row });
          used.add(c); used.add(c+1);
        }
      }
    }
  }
  return result;
}

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ---- DRAW ---- */
const PAD = 60, TOP = 70, BOT_PAD = 70;

function layout() {
  const W = Math.max(N * 100, 240);
  const H = TOP + ROWS * 50 + BOT_PAD + 40;
  canvas.width = W;
  canvas.height = H;
  return { W, H, colX: Array.from({length:N},(_,i)=>PAD + i*(W-PAD*2)/(N-1)) };
}

function drawAmida(highlightPath, animFrac) {
  const { W, H, colX } = layout();
  ctx.clearRect(0, 0, W, H);

  const rowY = row => TOP + row * ((H - TOP - BOT_PAD) / ROWS);

  // Background glow columns
  colX.forEach((x, i) => {
    const grad = ctx.createLinearGradient(x, TOP, x, H-BOT_PAD);
    grad.addColorStop(0, PALETTE[i] + '20');
    grad.addColorStop(1, PALETTE[i] + '05');
    ctx.fillStyle = grad;
    ctx.fillRect(x - 18, TOP, 36, H - TOP - BOT_PAD);
  });

  // Vertical lines
  colX.forEach((x, i) => {
    ctx.beginPath();
    ctx.moveTo(x, TOP);
    ctx.lineTo(x, H - BOT_PAD);
    ctx.strokeStyle = PALETTE[i % PALETTE.length];
    ctx.lineWidth = 2.5;
    ctx.shadowColor = PALETTE[i % PALETTE.length];
    ctx.shadowBlur = 6;
    ctx.stroke();
    ctx.shadowBlur = 0;
  });

  // Horizontal rungs
  rungs.forEach(({ c, row }) => {
    const x1 = colX[c], x2 = colX[c+1];
    const y = rowY(row + .5);
    ctx.beginPath();
    ctx.moveTo(x1, y); ctx.lineTo(x2, y);
    ctx.strokeStyle = 'rgba(255,255,255,.55)';
    ctx.lineWidth = 2.2;
    ctx.shadowColor = 'rgba(255,255,255,.3)';
    ctx.shadowBlur = 4;
    ctx.stroke();
    ctx.shadowBlur = 0;
  });

  // Top name buttons
  const names = getNames();
  colX.forEach((x, i) => {
    const color = PALETTE[i % PALETTE.length];
    // Button bg
    ctx.beginPath();
    roundRect(ctx, x - 36, 8, 72, 36, 10);
    ctx.fillStyle = color + '22';
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Circle at top
    ctx.beginPath(); ctx.arc(x, TOP, 7, 0, Math.PI*2);
    ctx.fillStyle = color; ctx.fill();
    // Name text
    ctx.fillStyle = color;
    ctx.font = `600 13px -apple-system,sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(names[i].slice(0,6), x, 32);
  });

  // Bottom prize circles
  const prizes = getPrizes();
  const mapping = computeMapping();
  colX.forEach((x, i) => {
    const color = PALETTE[i % PALETTE.length];
    ctx.beginPath(); ctx.arc(x, H - BOT_PAD, 7, 0, Math.PI*2);
    ctx.fillStyle = color + '33'; ctx.fill();
    ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.stroke();
    const prizeIdx = mapping[i];
    ctx.fillStyle = color;
    ctx.font = `600 11px -apple-system,sans-serif`;
    ctx.textAlign = 'center';
    // Prize text (wrapped)
    const pt = prizes[prizeIdx] || '—';
    ctx.fillText(pt.slice(0,8), x, H - BOT_PAD + 22);
    ctx.fillStyle = 'rgba(255,255,255,.3)';
    ctx.font = `500 9px -apple-system,sans-serif`;
    ctx.fillText(`→ ${names[prizeIdx]}`, x, H - BOT_PAD + 36);
  });

  // Animated path
  if (highlightPath && highlightPath.length > 1) {
    drawPath(highlightPath, animFrac, colX, rowY, H);
  }

  // Click zones (drawn invisibly, handled via JS click)
}

function drawPath(path, frac, colX, rowY, H) {
  const totalLen = path.length - 1;
  const drawUpTo = frac * totalLen;

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineWidth = 5;

  let drawn = 0;
  for (let i = 0; i < path.length - 1 && drawn < drawUpTo; i++) {
    const seg = path[i], nextSeg = path[i+1];
    const sx = getPathX(seg, colX);
    const sy = getPathY(seg, rowY, H);
    const ex = getPathX(nextSeg, colX);
    const ey = getPathY(nextSeg, rowY, H);
    const t = Math.min(1, drawUpTo - drawn);

    const mx = sx + (ex - sx) * t;
    const my = sy + (ey - sy) * t;

    ctx.beginPath();
    ctx.moveTo(sx, sy); ctx.lineTo(mx, my);
    const grad = ctx.createLinearGradient(sx, sy, mx, my);
    grad.addColorStop(0, '#6ee7b7');
    grad.addColorStop(1, '#34d399');
    ctx.strokeStyle = grad;
    ctx.shadowColor = '#34d399';
    ctx.shadowBlur = 14;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Bright head dot
    if (t === 1 || i === Math.floor(drawUpTo)) {
      ctx.beginPath();
      ctx.arc(mx, my, 8, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.shadowColor = '#34d399';
      ctx.shadowBlur = 20;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    drawn++;
  }
  ctx.restore();
}

function getPathX({ col }, colX) { return colX[col]; }
function getPathY({ row }, rowY, H) {
  const BOT = H - BOT_PAD;
  if (row === -1) return TOP;
  if (row === ROWS) return BOT;
  return rowY(row + .5);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

/* ---- TRACING LOGIC ---- */
function computeMapping() {
  // Returns mapping[col] = final destination column for participant at col
  const mapping = Array.from({length:N},(_,i)=>i);
  // For each starting column, trace the path
  for (let start = 0; start < N; start++) {
    let col = start;
    for (let row = 0; row < ROWS; row++) {
      // Check for rung at this "half-row" that connects col to col-1 or col+1
      const rung = rungs.find(r => r.row === row && (r.c === col || r.c === col - 1));
      if (rung) col = rung.c === col ? col + 1 : col - 1;
    }
    mapping[start] = col;
  }
  return mapping;
}

function tracePath(startCol) {
  // Returns array of {col, row} waypoints
  const path = [{ col: startCol, row: -1 }];
  let col = startCol;
  for (let row = 0; row < ROWS; row++) {
    path.push({ col, row }); // entering this row from above
    const rung = rungs.find(r => r.row === row && (r.c === col || r.c === col - 1));
    if (rung) {
      col = rung.c === col ? col + 1 : col - 1;
      path.push({ col, row }); // after crossing rung
    }
  }
  path.push({ col, row: ROWS });
  return path;
}

function getNames() {
  return Array.from({length:N},(_,i)=>{
    const el = document.getElementById(`name-${i}`);
    return el ? el.value.trim() || `P${i+1}` : `P${i+1}`;
  });
}

function getPrizes() {
  return Array.from({length:N},(_,i)=>{
    const el = document.getElementById(`prize-${i}`);
    return el ? el.value.trim() || `賞品${i+1}` : `賞品${i+1}`;
  });
}

/* ---- CLICK ON CANVAS ---- */
canvas.addEventListener('click', e => {
  if (!generated || tracing) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const cx = (e.clientX - rect.left) * scaleX;
  const cy = (e.clientY - rect.top) * (canvas.height / rect.height);

  const { colX } = layout();
  for (let i = 0; i < N; i++) {
    if (Math.abs(cx - colX[i]) < 40 && cy < TOP + 20) {
      startTrace(i);
      return;
    }
  }
});

function startTrace(col) {
  if (tracing) return;
  tracing = true;
  const path = tracePath(col);
  const totalFrames = path.length * 18;
  let frame = 0;

  function animate() {
    const frac = frame / totalFrames;
    drawAmida(path, frac);
    frame++;
    if (frame <= totalFrames) {
      requestAnimationFrame(animate);
    } else {
      // Show result
      tracing = false;
      const mapping = computeMapping();
      const destCol = path[path.length-1].col;
      const names = getNames();
      const prizes = getPrizes();
      setTimeout(() => {
        document.getElementById('r-name').textContent = names[col];
        document.getElementById('r-prize').textContent = prizes[destCol];
        document.getElementById('overlay').classList.add('show');
        startConfetti();
      }, 300);
    }
  }
  animate();
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
  stopConfetti();
  drawAmida(); // redraw clean
}

function resetAll() {
  generated = false;
  rungs = [];
  tracing = false;
  document.getElementById('instruction').style.display = 'none';
  document.getElementById('gen-btn').textContent = 'あみだを作る / GENERATE';
  resetCanvas();
}

function resetCanvas() {
  const { W, H } = layout();
  ctx.clearRect(0, 0, W, H);
}

/* ---- CONFETTI ---- */
const confCanvas = document.getElementById('confetti');
const confCtx = confCanvas.getContext('2d');
let confPts = [], confAnim = null;
const CONF_COLS = ['#34d399','#22d3ee','#f472b6','#f59e0b','#a78bfa','#6ee7b7'];
function resizeConf(){confCanvas.width=innerWidth;confCanvas.height=innerHeight}
resizeConf();window.addEventListener('resize',resizeConf);
function startConfetti(){
  confPts=[];
  for(let i=0;i<100;i++){confPts.push({x:Math.random()*confCanvas.width,y:-20-Math.random()*80,vx:(Math.random()-.5)*4,vy:2+Math.random()*4,r:4+Math.random()*5,c:CONF_COLS[Math.floor(Math.random()*CONF_COLS.length)],rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.12})}
  function f(){confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);confPts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.07;p.rot+=p.rs;confCtx.save();confCtx.translate(p.x,p.y);confCtx.rotate(p.rot);confCtx.fillStyle=p.c;confCtx.globalAlpha=Math.max(0,1-p.y/confCanvas.height);confCtx.fillRect(-p.r/2,-p.r*.35,p.r,p.r*.7);confCtx.restore();});confPts=confPts.filter(p=>p.y<confCanvas.height+40);if(confPts.length>0)confAnim=requestAnimationFrame(f);else confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);}
  if(confAnim)cancelAnimationFrame(confAnim);f();
}
function stopConfetti(){if(confAnim)cancelAnimationFrame(confAnim);confCtx.clearRect(0,0,confCanvas.width,confCanvas.height)}

// Init
buildInputs();
resetCanvas();
</script>
</body>
</html>
