<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コイントス — RANDOM PICKER</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#04040f;--gold:#f59e0b;--gold-lt:#fcd34d;--silver:#94a3b8;
  --text:#e2e8f0;--muted:#64748b;
  --border:rgba(255,255,255,.09);--glass:rgba(255,255,255,.04);
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}

/* ── NAV ── */
nav{width:100%;padding:1.2rem 2rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid var(--border);background:rgba(4,4,15,.85);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50}
.nav-back{display:inline-flex;align-items:center;gap:.4rem;color:var(--muted);font-size:.85rem;text-decoration:none;transition:color .2s}.nav-back:hover{color:var(--text)}.nav-back svg{width:16px;height:16px}
.nav-title{font-weight:800;font-size:1rem;color:var(--gold);letter-spacing:.05em}

/* ── AMBIENT GLOW ── */
.glow-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.glow-bg::before{
  content:'';position:absolute;
  width:640px;height:640px;border-radius:50%;
  background:radial-gradient(circle,rgba(245,158,11,.1),transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-55%);
  animation:pulse 5s ease-in-out infinite alternate;
}
@keyframes pulse{
  from{opacity:.5;transform:translate(-50%,-55%) scale(1)}
  to{opacity:1;transform:translate(-50%,-55%) scale(1.18)}
}

/* ── MAIN ── */
main{
  position:relative;z-index:1;flex:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem 2rem 2.5rem;gap:2rem;width:100%;max-width:560px;
}

.page-title{text-align:center}
.page-title h1{font-size:2.2rem;font-weight:900}
.page-title h1 span{
  background:linear-gradient(135deg,#fde68a,#f59e0b,#d97706);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.page-title p{color:var(--muted);font-size:.82rem;margin-top:.35rem;letter-spacing:.06em}

/* ── COIN STAGE ── */
.stage{
  position:relative;width:260px;height:300px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
}

/* Glow ring — SEPARATE element, its own filter doesn't break preserve-3d */
.coin-glow{
  position:absolute;
  width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(245,158,11,.55) 10%,rgba(245,158,11,.15) 55%,transparent 75%);
  filter:blur(28px);
  pointer-events:none;
  transition:opacity .4s;
  animation:glowPulse 3s ease-in-out infinite alternate;
}
@keyframes glowPulse{
  from{opacity:.6;transform:scale(.95)}
  to{opacity:1;transform:scale(1.05)}
}

/* 3D scene — perspective parent */
.scene{
  width:220px;height:220px;
  perspective:750px;
  position:relative;
}

/* 3D coin — NO filter (filter breaks preserve-3d + backface-visibility!) */
.coin{
  width:100%;height:100%;
  position:relative;
  transform-style:preserve-3d;
  transform:translateY(0px) rotateX(0deg);
  will-change:transform;
}

/* Both faces */
.face,.back{
  position:absolute;inset:0;
  border-radius:50%;overflow:hidden;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
}

/*
  VERTICAL FLIP: coin rotates around X axis.
  Back face is pre-rotated 180° around X so it shows when coin reaches rotateX(180deg).
  Combined transform: rotateX(180coin) + rotateX(180self) = rotateX(360) = identity → right-side-up. ✓
*/
.back{transform:rotateX(180deg)}

/* ── RESULT ── */
.result-area{min-height:3rem;text-align:center}
.result-label{
  font-size:1.8rem;font-weight:900;letter-spacing:.05em;
  opacity:0;transform:scale(.5) translateY(8px);
  transition:all .45s cubic-bezier(.34,1.56,.64,1);
}
.result-label.show{opacity:1;transform:scale(1) translateY(0)}
.result-label.heads{color:var(--gold);text-shadow:0 0 28px rgba(245,158,11,.7)}
.result-label.tails{color:#cbd5e1;text-shadow:0 0 28px rgba(148,163,184,.55)}
.result-sub{font-size:.88rem;color:var(--muted);margin-top:.3rem;opacity:0;transition:opacity .3s .25s}
.result-label.show~.result-sub{opacity:1}

/* ── TOSS BUTTON ── */
.toss-btn{
  padding:.95rem 3.5rem;border-radius:50px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#fcd34d,#f59e0b,#d97706);
  color:#1c0a00;font-size:1.1rem;font-weight:900;letter-spacing:.12em;
  box-shadow:0 4px 28px rgba(245,158,11,.45);
  transition:transform .2s,box-shadow .2s;
  animation:btnPulse 2.8s ease-in-out infinite;
}
@keyframes btnPulse{
  0%,100%{box-shadow:0 4px 28px rgba(245,158,11,.35),0 0 0 0 rgba(245,158,11,.2)}
  50%{box-shadow:0 6px 36px rgba(245,158,11,.6),0 0 0 11px rgba(245,158,11,0)}
}
.toss-btn:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 8px 40px rgba(245,158,11,.7)}
.toss-btn:active{transform:scale(.97)}
.toss-btn:disabled{opacity:.45;cursor:not-allowed;animation:none;transform:none}

/* ── STATS ── */
.stats{
  display:flex;gap:2.5rem;align-items:center;justify-content:center;
  background:var(--glass);border:1px solid var(--border);border-radius:20px;padding:1.1rem 2.5rem;
}
.stat-val{font-size:1.8rem;font-weight:900}
.stat-val.h{color:var(--gold)}.stat-val.t{color:#cbd5e1}
.stat-sep{color:var(--muted);font-size:1.1rem}
.stat-label{display:block;font-size:.62rem;font-weight:500;color:var(--muted);letter-spacing:.15em;text-align:center;margin-top:.2rem}

/* ── HISTORY ── */
.history{display:flex;flex-direction:column;align-items:center;gap:.65rem;width:100%}
.hist-label{font-size:.7rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase}
.hist-dots{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center;min-height:28px}
.dot{
  width:28px;height:28px;border-radius:50%;
  font-size:.62rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  animation:dotPop .35s cubic-bezier(.34,1.56,.64,1) backwards;
}
@keyframes dotPop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.dot.H{background:rgba(245,158,11,.18);border:2px solid var(--gold);color:var(--gold)}
.dot.T{background:rgba(203,213,225,.1);border:2px solid #94a3b8;color:#cbd5e1}
</style>
</head>
<body>
<div class="glow-bg"></div>

<nav>
  <a class="nav-back" href="../"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>TOP</a>
  <span class="nav-title">✦ COIN TOSS</span>
</nav>

<main>
  <div class="page-title">
    <h1><span>コイントス</span></h1>
    <p>COIN TOSS — TAP THE COIN OR BUTTON</p>
  </div>

  <div class="stage" onclick="toss()">
    <!-- Glow effect (separate div — safe to use filter here) -->
    <div class="coin-glow" id="coin-glow"></div>

    <!-- 3D coin scene (NO filter on this or .coin) -->
    <div class="scene">
      <div class="coin" id="coin">

        <!-- ═══════ HEADS / 表 ═══════ -->
        <div class="face">
          <img src="COIN_HEAD.jpg" alt="HEADS" style="width:100%;height:100%;object-fit:cover;display:block;">
        </div>

        <!-- ═══════ TAILS / 裏 ═══════
             This div has transform:rotateX(180deg).
             When coin reaches rotateX(180deg), combined = 360deg = identity → content appears right-side-up. -->
        <div class="back">
          <img src="COIN_TAILS.jpg" alt="TAILS" style="width:100%;height:100%;object-fit:cover;display:block;">
        </div>

      </div><!-- /coin -->
    </div><!-- /scene -->
  </div><!-- /stage -->

  <div class="result-area">
    <div class="result-label" id="result-label"></div>
    <div class="result-sub"  id="result-sub"></div>
  </div>

  <button class="toss-btn" id="toss-btn" onclick="toss()">TOSS!</button>

  <div class="stats">
    <div>
      <span class="stat-val h" id="h-count">0</span>
      <span class="stat-label">HEADS / 表</span>
    </div>
    <span class="stat-sep">·</span>
    <div>
      <span class="stat-val t" id="t-count">0</span>
      <span class="stat-label">TAILS / 裏</span>
    </div>
  </div>

  <div class="history">
    <div class="hist-label">履歴 HISTORY</div>
    <div class="hist-dots" id="dots"></div>
  </div>
</main>

<script>
const coin    = document.getElementById('coin');
const glow    = document.getElementById('coin-glow');
const resLbl  = document.getElementById('result-label');
const resSub  = document.getElementById('result-sub');
const btn     = document.getElementById('toss-btn');
const dotsEl  = document.getElementById('dots');

let rotX = 0;        // cumulative — never reset between tosses
let animating = false;
let hCount = 0, tCount = 0;
const hist = [];

/* ── angle calculation ── */
function calcEndAngle(cur, isHeads) {
  const BASE    = 4 * 360;       // at least 4 full spins
  const target  = isHeads ? 0 : 180;
  const curr360 = ((cur % 360) + 360) % 360;
  let diff = ((target - curr360) + 360) % 360;
  if (diff < 50) diff += 360;   // ensure meaningful rotation even when close to target
  return cur + BASE + diff;
}

/* ── easing ── */
function easeOut(t){ return 1 - Math.pow(1 - t, 2.5) }

/* ── main toss ── */
function toss() {
  if (animating) return;
  animating = true;
  btn.disabled = true;
  resLbl.classList.remove('show');

  const isHeads    = Math.random() < 0.5;
  const startAngle = rotX;
  const endAngle   = calcEndAngle(rotX, isHeads);
  const delta      = endAngle - startAngle;

  const DURATION   = 1750;    // ms
  const ARC        = -195;    // px upward
  const startTime  = performance.now();

  function frame(now) {
    const t = Math.min((now - startTime) / DURATION, 1);

    /* rotation: linear in-air → ease-out on landing */
    const SPLIT = 0.78;
    const rotT  = t < SPLIT
      ? t
      : SPLIT + (1 - SPLIT) * easeOut((t - SPLIT) / (1 - SPLIT));

    /* parabolic arc */
    const y = ARC * Math.sin(t * Math.PI);

    coin.style.transform =
      `translateY(${y.toFixed(1)}px) rotateX(${(startAngle + delta * rotT).toFixed(2)}deg)`;

    /* sync glow: shrink during flight, expand on land */
    const glowScale = 1 - 0.4 * Math.sin(t * Math.PI);
    glow.style.transform = `scale(${glowScale.toFixed(3)})`;

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      rotX = endAngle;
      coin.style.transform = `translateY(0px) rotateX(${endAngle}deg)`;
      glow.style.transform  = 'scale(1)';
      animating = false;
      btn.disabled = false;
      showResult(isHeads);
    }
  }

  requestAnimationFrame(frame);
}

function showResult(isHeads) {
  if (isHeads) { hCount++; document.getElementById('h-count').textContent = hCount; }
  else         { tCount++; document.getElementById('t-count').textContent = tCount; }

  resLbl.textContent = isHeads ? '表 — HEADS' : '裏 — TAILS';
  resLbl.className   = 'result-label show ' + (isHeads ? 'heads' : 'tails');
  resSub.textContent = isHeads ? '表が出ました！' : '裏が出ました！';

  hist.push(isHeads ? 'H' : 'T');
  if (hist.length > 14) hist.shift();
  dotsEl.innerHTML = '';
  hist.forEach((m, i) => {
    const d = document.createElement('div');
    d.className = `dot ${m}`;
    d.textContent = m;
    d.style.animationDelay = `${i * 0.04}s`;
    dotsEl.appendChild(d);
  });
}
</script>
</body>
</html>
