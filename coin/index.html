<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コイントス — RANDOM PICKER</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#04040f;--gold:#f59e0b;--silver:#94a3b8;--text:#e2e8f0;--muted:#64748b;--border:rgba(255,255,255,.09);--glass:rgba(255,255,255,.04)}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}

/* NAV */
nav{
  width:100%;padding:1.1rem 1.75rem;
  display:flex;align-items:center;gap:1rem;
  border-bottom:1px solid var(--border);
  background:rgba(4,4,15,.9);backdrop-filter:blur(14px);
  position:sticky;top:0;z-index:100;
}
.back{
  display:inline-flex;align-items:center;gap:.45rem;
  color:#e2e8f0;font-size:.88rem;font-weight:600;
  text-decoration:none;
  padding:.4rem .9rem;border-radius:20px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  transition:all .2s;
}
.back:hover{background:rgba(255,255,255,.12);color:#fff}
.back svg{width:15px;height:15px}
.nav-title{font-weight:800;font-size:1rem;color:var(--gold);letter-spacing:.06em}

/* GLOW */
.glow-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.glow-bg::before{content:'';position:absolute;width:640px;height:640px;border-radius:50%;background:radial-gradient(circle,rgba(245,158,11,.11),transparent 70%);top:50%;left:50%;transform:translate(-50%,-55%);animation:pulse 5s ease-in-out infinite alternate}
@keyframes pulse{from{opacity:.5;transform:translate(-50%,-55%) scale(1)}to{opacity:1;transform:translate(-50%,-55%) scale(1.18)}}

/* MAIN */
main{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 2rem 3rem;gap:2rem;width:100%;max-width:560px}

.page-title{text-align:center}
.page-title h1{font-size:2.3rem;font-weight:900;letter-spacing:-.02em}
.page-title h1 span{background:linear-gradient(135deg,#fde68a,#f59e0b,#d97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.page-title p{color:var(--muted);font-size:.82rem;margin-top:.35rem;letter-spacing:.06em}

/* COIN STAGE */
.stage{
  height:320px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.scene{width:220px;height:220px;perspective:750px;user-select:none}
.coin{
  width:100%;height:100%;
  position:relative;transform-style:preserve-3d;
  transform:translateY(0px) rotateX(0deg);
  filter:drop-shadow(0 10px 30px rgba(245,158,11,.45)) drop-shadow(0 4px 10px rgba(0,0,0,.6));
  will-change:transform;
}
.face,.back{
  position:absolute;inset:0;border-radius:50%;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  overflow:hidden;
}
/* TAILS face is behind — rotate 180deg around X so it shows when coin flips vertically */
.back{transform:rotateX(180deg)}

/* RESULT */
.result-area{min-height:3.2rem;text-align:center}
.result-label{
  font-size:1.85rem;font-weight:900;letter-spacing:.06em;
  opacity:0;transform:scale(.5) translateY(10px);
  transition:all .45s cubic-bezier(.34,1.56,.64,1);
}
.result-label.show{opacity:1;transform:scale(1) translateY(0)}
.result-label.heads{color:var(--gold);text-shadow:0 0 30px rgba(245,158,11,.7)}
.result-label.tails{color:#cbd5e1;text-shadow:0 0 30px rgba(148,163,184,.6)}
.result-sub{font-size:.88rem;color:var(--muted);margin-top:.3rem;opacity:0;transition:opacity .3s .25s}
.result-label.show~.result-sub{opacity:1}

/* BUTTON */
.toss-btn{
  padding:.95rem 3.5rem;border-radius:50px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#fcd34d,#f59e0b,#d97706);
  color:#1c0a00;font-size:1.1rem;font-weight:900;letter-spacing:.12em;
  box-shadow:0 4px 28px rgba(245,158,11,.5);
  transition:transform .2s,box-shadow .2s;
  animation:btnPulse 2.8s ease-in-out infinite;
}
@keyframes btnPulse{0%,100%{box-shadow:0 4px 28px rgba(245,158,11,.4),0 0 0 0 rgba(245,158,11,.2)}50%{box-shadow:0 6px 36px rgba(245,158,11,.65),0 0 0 11px rgba(245,158,11,0)}}
.toss-btn:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 8px 40px rgba(245,158,11,.7)}
.toss-btn:active{transform:scale(.97)}
.toss-btn:disabled{opacity:.45;cursor:not-allowed;animation:none;transform:none}

/* STATS */
.stats{
  display:flex;gap:2.5rem;align-items:center;justify-content:center;
  background:var(--glass);border:1px solid var(--border);border-radius:20px;padding:1.1rem 2.5rem;
}
.stat-val{font-size:1.8rem;font-weight:900}
.stat-val.h{color:var(--gold)}
.stat-val.t{color:#cbd5e1}
.stat-sep{color:var(--muted);font-size:1.1rem}
.stat-label{display:block;font-size:.62rem;font-weight:500;color:var(--muted);letter-spacing:.15em;text-align:center;margin-top:.2rem}

/* HISTORY */
.history{display:flex;flex-direction:column;align-items:center;gap:.65rem;width:100%}
.hist-label{font-size:.7rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase}
.hist-dots{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center;min-height:28px}
.dot{
  width:28px;height:28px;border-radius:50%;font-size:.62rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  animation:dotPop .35s cubic-bezier(.34,1.56,.64,1) backwards;
}
@keyframes dotPop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.dot.H{background:rgba(245,158,11,.18);border:2px solid var(--gold);color:var(--gold)}
.dot.T{background:rgba(203,213,225,.1);border:2px solid #94a3b8;color:#cbd5e1}
</style>
</head>

<script>
const coin   = document.getElementById('coin');
const resLbl = document.getElementById('result-label');
const resSub = document.getElementById('result-sub');
const btn    = document.getElementById('toss-btn');
const dotsEl = document.getElementById('dots');

let rotX = 0;          // cumulative rotation — never reset between tosses
let animating = false;
let hCount = 0, tCount = 0;
const hist = [];

/* ---- helpers ---- */
function calcEndAngle(cur, isHeads) {
  const BASE    = 4 * 360;          // minimum 4 full spins
  const target  = isHeads ? 0 : 180;
  const curr360 = ((cur % 360) + 360) % 360;
  let diff = ((target - curr360) + 360) % 360;
  if (diff < 45) diff += 360;       // avoid tiny spin if already near target
  return cur + BASE + diff;
}

function easeOut(t) { return 1 - Math.pow(1 - t, 2.5); }

/* ---- main toss ---- */
function toss() {
  if (animating) return;
  animating = true;
  btn.disabled = true;
  resLbl.classList.remove('show');

  const isHeads   = Math.random() < 0.5;
  const startAngle = rotX;
  const endAngle   = calcEndAngle(rotX, isHeads);
  const delta      = endAngle - startAngle;

  const DURATION  = 1750;   // ms
  const ARC_HEIGHT = -190;  // px upward (negative = up in CSS)
  const startTime  = performance.now();

  function frame(now) {
    const t = Math.min((now - startTime) / DURATION, 1);

    /* rotation: linear phase → ease-out landing */
    const SPLIT = 0.78;
    const rotT  = t < SPLIT
      ? t                                                // linear in-air
      : SPLIT + (1 - SPLIT) * easeOut((t - SPLIT) / (1 - SPLIT)); // ease-out landing

    /* parabolic arc — peaks at t≈0.42, biased toward faster throw */
    const y = ARC_HEIGHT * Math.sin(t * Math.PI) * (1 + 0.3 * Math.sin(t * Math.PI));

    coin.style.transform = `translateY(${y.toFixed(2)}px) rotateX(${(startAngle + delta * rotT).toFixed(2)}deg)`;

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      rotX = endAngle;
      coin.style.transform = `translateY(0px) rotateX(${endAngle}deg)`;
      animating = false;
      btn.disabled = false;
      showResult(isHeads);
    }
  }

  requestAnimationFrame(frame);
}

function showResult(isHeads) {
  /* counts */
  if (isHeads) { hCount++; document.getElementById('h-count').textContent = hCount; }
  else         { tCount++; document.getElementById('t-count').textContent = tCount; }

  /* label */
  resLbl.textContent = isHeads ? '表 — HEADS' : '裏 — TAILS';
  resLbl.className   = 'result-label show ' + (isHeads ? 'heads' : 'tails');
  resSub.textContent = isHeads ? 'おめでとう！表が出ました！' : '裏が出ました！';

  /* history */
  hist.push(isHeads ? 'H' : 'T');
  if (hist.length > 14) hist.shift();
  dotsEl.innerHTML = '';
  hist.forEach((m, i) => {
    const d = document.createElement('div');
    d.className = `dot ${m}`;
    d.textContent = m;
    d.style.animationDelay = `${i * 0.04}s`;
    dotsEl.appendChild(d);
  });
}
</script>
</body>
</html>
